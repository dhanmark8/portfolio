<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery | Dhanmark Lunop</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        :root {
            --bg-main: #0a0a0f;
            --bg-soft: #171720;
            --card-bg: #11131c;
            --text-main: #f3f4f6;
            --accent: #60a5fa;
            --shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 10%, rgba(96, 165, 250, 0.13), transparent 35%),
                radial-gradient(circle at 85% 90%, rgba(34, 197, 94, 0.09), transparent 35%),
                var(--bg-main);
            color: var(--text-main);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .gallery-wrapper {
            min-height: 100vh;
        }

        .gallery-card {
            width: min(100%, 460px);
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            touch-action: pan-y;
        }

        .image-stage {
            position: relative;
            aspect-ratio: 4 / 5;
            background: var(--bg-soft);
            overflow: hidden;
        }

        .image-track {
            display: flex;
            height: 100%;
            width: 100%;
            transform: translateX(0);
            transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }

        .gallery-slide {
            min-width: 100%;
            height: 100%;
            user-select: none;
        }

        .gallery-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 0;
            pointer-events: none;
        }

        .gallery-meta {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-nav {
            width: 48px;
            height: 48px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .btn-nav:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.16);
            color: var(--text-main);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.25);
            transition: all 0.2s ease;
        }

        .dot.active {
            width: 24px;
            background: var(--accent);
        }

        @media (max-width: 576px) {
            .gallery-card {
                width: 100%;
                border-radius: 1rem;
            }

            .btn-nav {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <main class="container gallery-wrapper d-flex align-items-center py-4 py-md-5">
        <div class="row justify-content-center w-100 g-4">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 d-flex justify-content-center">
                <!-- Center card-style gallery -->
                <section class="gallery-card" aria-label="Image swipe gallery">
                    <div class="image-stage" id="swipeArea">
                        <div class="image-track" id="imageTrack" aria-live="polite"></div>
                    </div>

                    <!-- Gallery footer controls -->
                    <div class="gallery-meta p-3 p-md-4">
                        <div class="d-flex align-items-center justify-content-between gap-3">
                            <a href="index.html#home" class="btn btn-outline-light btn-sm">Back to Home</a>
                            <p class="mb-0 small text-light" id="imageCounter">1 / 10</p>
                        </div>

                        <div class="d-flex align-items-center justify-content-center gap-3 mt-3">
                            <button class="btn btn-nav d-none d-md-inline-flex align-items-center justify-content-center" id="prevBtn" aria-label="Previous image">&#10094;</button>
                            <div class="d-flex align-items-center gap-2" id="dots" aria-hidden="true"></div>
                            <button class="btn btn-nav d-none d-md-inline-flex align-items-center justify-content-center" id="nextBtn" aria-label="Next image">&#10095;</button>
                        </div>

                        <p class="text-center small text-secondary mt-3 mb-0 d-md-none">Swipe left or right to change photo</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        // Build image list (pic1.jpg to pic10.jpg)
        const images = Array.from({ length: 10 }, (_, i) => `pic${i + 1}.jpg`);

        const imageTrack = document.getElementById('imageTrack');
        const imageCounter = document.getElementById('imageCounter');
        const dotsContainer = document.getElementById('dots');
        const swipeArea = document.getElementById('swipeArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentIndex = 0;
        let startX = 0;
        let currentX = 0;
        let isSwiping = false;

        // Render all slides only on this page (not in index.html)
        images.forEach((src, i) => {
            const slide = document.createElement('div');
            slide.className = 'gallery-slide';

            const img = document.createElement('img');
            img.src = src;
            img.alt = `Gallery image ${i + 1}`;
            img.loading = i === 0 ? 'eager' : 'lazy';

            slide.appendChild(img);
            imageTrack.appendChild(slide);

            const dot = document.createElement('span');
            dot.className = 'dot';
            dotsContainer.appendChild(dot);
        });

        function updateGallery(animate = true) {
            imageTrack.style.transition = animate
                ? 'transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1)'
                : 'none';

            imageTrack.style.transform = `translateX(-${currentIndex * 100}%)`;
            imageCounter.textContent = `${currentIndex + 1} / ${images.length}`;

            [...dotsContainer.children].forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateGallery();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateGallery();
        }

        prevBtn.addEventListener('click', prevImage);
        nextBtn.addEventListener('click', nextImage);

        // Touch swipe handling for mobile
        swipeArea.addEventListener('touchstart', (event) => {
            startX = event.touches[0].clientX;
            currentX = startX;
            isSwiping = true;
            imageTrack.style.transition = 'none';
        }, { passive: true });

        swipeArea.addEventListener('touchmove', (event) => {
            if (!isSwiping) return;
            currentX = event.touches[0].clientX;
            const deltaX = currentX - startX;
            const base = -currentIndex * swipeArea.clientWidth;
            imageTrack.style.transform = `translateX(${base + deltaX}px)`;
        }, { passive: true });

        swipeArea.addEventListener('touchend', () => {
            if (!isSwiping) return;
            const deltaX = currentX - startX;
            const threshold = swipeArea.clientWidth * 0.2;

            if (deltaX < -threshold) {
                nextImage();
            } else if (deltaX > threshold) {
                prevImage();
            } else {
                updateGallery();
            }

            isSwiping = false;
            startX = 0;
            currentX = 0;
        });

        // Desktop keyboard support
        window.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') nextImage();
            if (event.key === 'ArrowLeft') prevImage();
        });

        updateGallery(false);
    </script>
</body>
</html>
